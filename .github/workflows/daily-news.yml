name: Daily AI News

on:
  schedule:
    # GitHub ActionsのcronはUTC。22:00 UTCは日本時間の翌朝7:00。
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  deliver:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run delivery script
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python scripts/main.py

